name: Deploy APEX TRUST Customer Segmentation FastAPI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/Apex-backend-app:latest .

    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/Apex-backend-app:latest

    - name: Deploy to EC2
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

        export MONGO_URI="${{ secrets.MONGO_URI }}"
        export MLFLOW_TOKEN="${{ secrets.MLFLOW_TOKEN }}"

        cd ~/app
        ./run.sh

        EOF